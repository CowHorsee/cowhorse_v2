# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure Functions: https://aka.ms/python-webapps-actions

name: Build and deploy Python project to Azure Function App - cow-horse-procurement

on:
  push:
    branches:
      - backend
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FUNCTION_APP_PROJECT_PATH: './api' # path to Azure Functions project in this monorepo
  PYTHON_VERSION: '3.12' # set this to the python version to use (supports 3.6, 3.7, 3.8)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd "${{ env.FUNCTION_APP_PROJECT_PATH }}"
          python -m pip install --upgrade pip
          # We don't install to .python_packages here if we use remote build
          pip install -r requirements.txt

      - name: Zip artifact for deployment
        run: |
          # This ensures host.json is at the ROOT of the zip
          cd "${{ env.FUNCTION_APP_PROJECT_PATH }}"
          zip -r ../release.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: 'Deploy to Azure Functions'
        uses: Azure/functions-action@v1
        with:
          app-name: 'cow-horse-procurement'
          package: 'release.zip'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_1BB182F19E954D519C66521590189A96 }}
          # Switch these to true for a cleaner Python 3.12 deployment
          scm-do-build-during-deployment: true
          enable-oryx-build: true